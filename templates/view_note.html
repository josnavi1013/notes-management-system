{% extends "base1.html" %}

{% block title %}My Notes - NMS{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center">
    <div class="card shadow-sm border-0 rounded-4" style="width: 100%; max-width: 800px;">
        <div class="card-body p-5">
            <div class="mb-2 d-flex justify-content-between align-items-start">
                <div>
                    <h2 class="fw-bold mb-1">{{ note.title }}</h2>
                    <p class="text-muted small">Created on: {{ note.created_at }}</p>
                </div>
                <a href="/notes" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    Back to List
                </a>
            </div>

            <hr class="text-muted opacity-25">

            <div class="note-content py-3" style="white-space: pre-wrap; line-height: 1.6;">
                {{ note.content }}
            </div>

            <div class="mt-3 pt-2 d-flex gap-2">
                <a href="/edit_note/{{ note['id'] }}" class="btn btn-primary rounded-pill px-4 fw-bold">
                    Edit
                </a>

                <a href="/delete_note/{{ note['id'] }}" class="btn btn-primary rounded-pill px-4 fw-bold"
                    onclick="return confirm('Are you sure?')">
                    Delete
                </a>

            </div>
        </div>
    </div>
</div>
{% endblock %}
