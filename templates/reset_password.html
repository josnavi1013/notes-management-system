{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="center-wrapper container">
<div class="card custom-card">
    <h3 class="text-center mb-3 fw-bold">Reset Password</h3>
    <p class="text-center text-muted small mb-4">Please enter your new password below.</p>

    

    <form method="POST">
        <div class="mb-4">
            <label class="form-label small fw-bold">New Password</label>
            <input type="password" name="password" class="form-control" placeholder="enter reset password" required>
        </div>
        
        <div class="d-grid">
            <button type="submit" class="btn btn-primary fw-bold shadow-sm">Reset Password</button>
        </div>
    </form>
</div>
</div>
{% endblock %}
