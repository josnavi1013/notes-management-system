{% extends "base.html" %}

{% block title %}Forgot Password - NMS{% endblock %}

{% block content %}
<div class="center-wrapper container">
<div class="card custom-card">
    <h3 class="text-center mb-3 fw-bold">Forgot Password</h3>
    <p class="text-center text-muted small mb-4">Enter your email address and we will send you a link to reset your password.</p>

    

    <form action="/send_reset_link" method="POST">
        <div class="mb-4">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="Enter registered email" required>
        </div>
        
        <div class="d-grid">
            <button type="submit" class="btn btn-primary fw-bold shadow-sm">Send Reset Link</button>
        </div>
    </form>

    <div class="text-center mt-4">
        <a href="/" class="text-decoration-none small fw-bold">Back to Login</a>
    </div>
</div>
</div>
{% endblock %}
